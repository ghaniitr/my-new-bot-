# Nginx configuration for Telegram Store Bot (VPS deployment)
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled

# HTTP - redirect to HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN.COM;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN.COM;

    # SSL certificates (generated by Certbot)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Root directory for PHP files
    root /var/www/storebot/php;
    index miniapp.php;

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Pass environment variables
        fastcgi_param BOT_TOKEN $BOT_TOKEN;
        fastcgi_param MYSQL_HOST $MYSQL_HOST;
        fastcgi_param MYSQL_PORT $MYSQL_PORT;
        fastcgi_param MYSQL_USER $MYSQL_USER;
        fastcgi_param MYSQL_PASSWORD $MYSQL_PASSWORD;
        fastcgi_param MYSQL_DATABASE $MYSQL_DATABASE;
    }

    # Static files
    location /static/ {
        alias /var/www/storebot/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    
    location ~ /\.env {
        deny all;
    }
    
    location ~ /\.git {
        deny all;
    }
}
